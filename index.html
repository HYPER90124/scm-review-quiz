<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>供应链管理复习答题</title>
<style>
:root{
  --bg:#f2f4f8;--card:#fff;--ink:#1c2333;--muted:#6b7385;--line:#e3e7ef;
  --blue:#2563eb;--blue-soft:#eaf0fe;--green:#16a34a;--green-soft:#e8f7ee;
  --red:#dc2626;--red-soft:#fdecec;--gold:#d97706;--gold-soft:#fdf3e0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  line-height:1.6;padding-bottom:env(safe-area-inset-bottom)}
#app{max-width:680px;margin:0 auto;padding:14px 14px 40px}
h1{font-size:1.25rem;margin:10px 2px 4px}
.sub{color:var(--muted);font-size:.85rem;margin:0 2px 14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 2px rgba(20,30,60,.04)}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
button{font:inherit;cursor:pointer;border:none;border-radius:12px}
.chapcard{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.chapcard:active{background:var(--blue-soft)}
.chapname{font-weight:600}
.chapmeta{color:var(--muted);font-size:.8rem}
.badge{background:var(--blue-soft);color:var(--blue);border-radius:999px;
  padding:2px 10px;font-size:.78rem;font-weight:600;white-space:nowrap}
.badge.red{background:var(--red-soft);color:var(--red)}
.badge.green{background:var(--green-soft);color:var(--green)}
.bigbtn{width:100%;padding:14px;border-radius:14px;font-size:1rem;font-weight:600;margin-bottom:8px}
.primary{background:var(--blue);color:#fff}
.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.danger-link{background:none;color:var(--muted);font-size:.8rem;text-decoration:underline;padding:8px}
.progress-outer{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 14px}
.progress-inner{height:100%;background:var(--blue);border-radius:999px;transition:width .25s}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.backbtn{background:none;color:var(--blue);font-weight:600;padding:8px 4px;font-size:.95rem}
.pos{color:var(--muted);font-size:.85rem}
.tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:6px}
.tag.single{background:var(--blue-soft);color:var(--blue)}
.tag.multi{background:#f3e8ff;color:#7c3aed}
.tag.judge{background:#e0f2fe;color:#0369a1}
.tag.essay{background:#ffe4e6;color:#be123c}
.tag.chap{background:var(--line);color:var(--muted)}
.star{color:var(--gold);font-size:.95rem;font-weight:700}
.qtext{font-size:1.02rem;font-weight:600;white-space:pre-wrap;margin-bottom:12px}
.opt{width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:.95rem;line-height:1.5;
  display:flex;gap:10px;align-items:flex-start}
.opt .letter{font-weight:700;color:var(--muted);flex:none}
.opt.sel{border-color:var(--blue);background:var(--blue-soft)}
.opt.sel .letter{color:var(--blue)}
.opt.right{border-color:var(--green);background:var(--green-soft)}
.opt.right .letter{color:var(--green)}
.opt.wrong{border-color:var(--red);background:var(--red-soft)}
.opt.wrong .letter{color:var(--red)}
.opt:disabled{cursor:default;opacity:1;color:inherit}
.verdict{font-weight:700;font-size:1rem;margin:10px 0 6px}
.verdict.ok{color:var(--green)}
.verdict.bad{color:var(--red)}
.refbox{background:var(--gold-soft);border:1px solid #f5e0b8;border-radius:12px;
  padding:12px 14px;font-size:.9rem;white-space:pre-wrap;margin-top:8px}
.refbox b{color:var(--gold)}
.corrbox{background:var(--red-soft);border:1px solid #f5c2c2;border-radius:12px;
  padding:12px 14px;font-size:.9rem;white-space:pre-wrap;margin-top:8px}
.navrow{display:flex;gap:8px;margin-top:14px}
.navrow button{flex:1;padding:12px;border-radius:12px;font-size:.95rem;font-weight:600}
.hint{color:var(--muted);font-size:.82rem;margin-top:6px}
.empty{text-align:center;color:var(--muted);padding:40px 10px}
.notice{background:var(--gold-soft);border-radius:10px;padding:8px 12px;
  font-size:.8rem;color:var(--gold);margin-bottom:10px}
.essay-input{width:100%;min-height:110px;border:1.5px solid var(--line);border-radius:12px;
  padding:11px 13px;font:inherit;font-size:.95rem;line-height:1.6;resize:vertical;
  background:var(--card);color:var(--ink);margin-top:4px}
.essay-input:focus{outline:none;border-color:var(--blue)}
.minebox{background:var(--blue-soft);border:1px solid #cdddfb;border-radius:12px;
  padding:12px 14px;font-size:.9rem;white-space:pre-wrap;margin-top:8px}
.minebox b{color:var(--blue)}
.selfrate{display:flex;gap:8px;margin-top:12px}
.selfrate button{flex:1;padding:13px;border-radius:12px;font-weight:700;font-size:.95rem}
.rate-ok{background:var(--green-soft);color:var(--green);border:1.5px solid var(--green)}
.rate-bad{background:var(--red-soft);color:var(--red);border:1.5px solid var(--red)}
.donebar{text-align:center;padding:18px;font-weight:700;color:var(--green)}
@media(min-width:700px){body{padding-top:16px}}
</style>
<style>
#lock{max-width:420px;margin:0 auto;padding:64px 20px;text-align:center}
#lock h1{font-size:1.3rem;margin:0 0 6px}
#lock p{color:var(--muted);font-size:.9rem;margin:0 0 24px}
#lock .pwbox{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:22px 20px;box-shadow:0 1px 3px rgba(20,30,60,.06)}
#lock input{width:100%;font:inherit;font-size:1.15rem;letter-spacing:.3em;text-align:center;
  padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}
#lock input:focus{outline:none;border-color:var(--blue)}
#lock button{width:100%;margin-top:12px;padding:14px;border-radius:12px;font-size:1rem;
  font-weight:600;background:var(--blue);color:#fff;border:none;cursor:pointer}
#lock button:disabled{opacity:.55;cursor:default}
#lock .err{color:var(--red);font-size:.88rem;margin-top:12px;min-height:1.2em}
#lock .lockicon{font-size:2.4rem;margin-bottom:10px}
</style>
</head>
<body>
<div id="lock">
  <div class="lockicon">🔒</div>
  <h1>供应链管理复习答题</h1>
  <p>请输入密码后开始答题</p>
  <div class="pwbox">
    <input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="请输入密码" aria-label="密码">
    <button id="unlock">进入答题</button>
    <div class="err" id="err"></div>
  </div>
</div>
<div id="app" style="display:none"></div>
